  Concluding with a JSON block is mandatory.
  1. `add_flexible`: activity, duration, time_window, priority.
  2. `add_hard`: activity, duration, time, priority.
  3. `update`: change priority or duration.
  4. `delete`: remove task.

  EXAMPLE:
